name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: backend
          args: --timeout=5m

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: licenseiq
          POSTGRES_PASSWORD: licenseiq
          POSTGRES_DB: licenseiq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U licenseiq -d licenseiq"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        working-directory: backend
        run: go mod download

      - name: Test integration
        working-directory: backend
        env:
          LICENSEIQ_TEST_POSTGRES_DSN: postgres://licenseiq:licenseiq@localhost:5432/licenseiq?sslmode=disable
        run: go test -tags=integration -p 1 ./...

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build backend image
        run: |
          docker build \
            --build-arg VERSION=${GITHUB_SHA} \
            --build-arg COMMIT=${GITHUB_SHA} \
            --build-arg DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t licenseiq-api:ci \
            -f backend/Dockerfile \
            backend
