services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: licenseiq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-licenseiq}
      POSTGRES_DB: licenseiq
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U licenseiq -d licenseiq"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  valkey:
    image: valkey/valkey:9
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        DATE: ${DATE:-unknown}
    environment:
      HTTP_ADDR: :8080
      HTTP_READ_TIMEOUT: 15s
      HTTP_WRITE_TIMEOUT: 15s
      HTTP_SHUTDOWN_TIMEOUT: 15s
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: licenseiq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-licenseiq}
      POSTGRES_DATABASE: licenseiq
      POSTGRES_SSLMODE: disable
      VALKEY_ADDR: valkey:6379
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DEV: ${LOG_DEV:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-licenseiq}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:8080
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      API_INTERNAL_URL: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch(\\\'http://127.0.0.1:3000\\\').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres-data:
  valkey-data:
